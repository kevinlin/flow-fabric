name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Test
        run: |
          pnpm --filter @flowfabric/web test
          pnpm --filter @flowfabric/shared exec vitest run --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml
          pnpm --filter @flowfabric/server exec vitest run --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml

      - name: Publish JUnit report
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: packages/*/test-results/junit.xml
          annotate_only: true
          detailed_summary: true

      - name: Upload JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-test-results
          path: packages/*/test-results/junit.xml
          if-no-files-found: warn
